name: Update Prices
on:
  schedule:
    - cron: "0,30 9,10,11,12,13,14,15,16,17 * * 1,2,3,4,5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch prices
        run: python3 fetch_prices.py

      - name: Commit
        run: |
          git config user.name "PEA Bot"
          git config user.email "bot@noreply.github.com"
          git add prices.json
          git diff --staged --quiet || (git commit -m "prices $(date -u +%H:%M)" && git push)
