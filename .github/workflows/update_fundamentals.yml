name: Update Fundamentals & Earnings Calendar

on:
  schedule:
    - cron: '0 */4 * * 1-5'
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force update complete'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pandas pytz --quiet

      - name: Run fundamentals update
        run: python fetch_fundamentals.py

      - name: Commit if data changed
        run: |
          git config --local user.email "valpea-bot@github.com"
          git config --local user.name "VAL.PEA Bot"
          git diff --quiet data.js fundamentals_log.json 2>/dev/null || (
            git add data.js fundamentals_log.json &&
            git commit -m "📊 Fundamentals $(date '+%Y-%m-%d %H:%M UTC') [skip ci]" &&
            git push
          )
          echo "Done"
