name: VAL.PEA — Prix clôture 17h35 (Lun-Ven)

on:
  schedule:
    - cron: '35 15 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer yfinance
        run: pip install yfinance
      - name: Mise a jour des prix
        run: python update_prices.py
      - name: Commit et push
        run: |
          git config user.name "PEA Bot"
          git config user.email "bot@pea.fr"
          git add index.html
          git diff --staged --quiet || git commit -m "Cloture $(date '+%d/%m %H:%M')"
          git push
