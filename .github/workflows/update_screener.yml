name: Update PEA Screener

on:
  schedule:
    - cron: '35 17 * * 1-5'   # Lundi-vendredi 17h35 Paris (UTC+2 = 15h35 UTC)
    - cron: '0 7 * * 0'        # Dimanche 9h Paris (UTC+2 = 7h UTC)
    - cron: '0 17 * * 5'       # Vendredi 19h Paris = 17h UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dependances
        run: pip install yfinance requests

      - name: Mise a jour des prix
        run: python fetch_prices.py

      - name: Analyse signaux et email enrichi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # Compatibilite anciens secrets Gmail
          GMAIL_USER: ${{ secrets.MAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.MAIL_PASS }}
        run: python generate_reports.py

      - name: Macro Digest (dimanche uniquement)
        if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.MAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.MAIL_PASS }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python macro_digest.py

      - name: Alertes signaux (send_alerts_v2)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.MAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.MAIL_PASS }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_alerts_v2.py

      - name: Commit et push
        run: |
          git config user.name "PEA Bot"
          git config user.email "bot@pea.fr"
          git add -A
          git diff --staged --quiet || git commit -m "Update $(date '+%d/%m %H:%M')"
          git push

      - name: Upgrade Node.js actions (compatibilite)
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: echo "Node24 force"
