name: Update PEA Screener

on:
  schedule:
    - cron: '35 16 * * 1-4'   # Lun-Jeu 17h35 Paris : prix + mail soir
    - cron: '0 17 * * 5'       # Vendredi 18h00 : prix + recalibration zones
    - cron: '0 8 * * 6'        # Samedi 8h00 : fondamentaux
    - cron: '0 1 * * *'        # 1er du mois : fondamentaux complets
    - cron: '0 7 * * 0'        # Dimanche 9h00 Paris : mail spécial avec insights YouTube
  workflow_dispatch:
    inputs:
      mode:
        description: 'prices / fundamentals / full / sunday'
        required: false
        default: 'prices'

permissions:
  contents: write

jobs:
  update-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine mode
        id: mode
        run: |
          DAY=$(date +%u)
          DOM=$(date +%d)
          MODE="${{ github.event.inputs.mode }}"
          if   [ "$MODE" = "sunday" ] || [ "$DAY" = "7" ]; then
            echo "mode=sunday" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "full" ] || [ "$DOM" = "01" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "fundamentals" ] || [ "$DAY" = "6" ]; then
            echo "mode=fundamentals" >> $GITHUB_OUTPUT
          elif [ "$DAY" = "5" ]; then
            echo "mode=friday" >> $GITHUB_OUTPUT
          else
            echo "mode=prices" >> $GITHUB_OUTPUT
          fi

      - name: Update prices
        if: steps.mode.outputs.mode != 'fundamentals' && steps.mode.outputs.mode != 'sunday'
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "friday" ] || [ "${{ steps.mode.outputs.mode }}" = "full" ]; then
            python update_prices_v2.py --full
          else
            python update_prices_v2.py
          fi

      - name: Update fundamentals
        if: steps.mode.outputs.mode == 'fundamentals' || steps.mode.outputs.mode == 'full'
        run: python update_fundamentals.py

      - name: Send alert mail (soir semaine)
        if: steps.mode.outputs.mode == 'prices' || steps.mode.outputs.mode == 'friday'
        run: python send_alerts_v2.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Send SUNDAY mail (avec insights YouTube)
        if: steps.mode.outputs.mode == 'sunday'
        run: python send_alerts_v2.py --insights
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "PEA Screener Bot"
          git add index.html prices_history.json fundamentals_log.json || true
          git diff --staged --quiet || git commit -m "Auto: $(date +'%d/%m/%Y %H:%M') — ${{ steps.mode.outputs.mode }}"
          git push
