name: Update PEA Screener

on:
  schedule:
    - cron: '0 16 * * 5'    # Vendredi 18h00 — prix + mail
    - cron: '0 6 * * 6'     # Samedi 8h00 — fondamentaux
    - cron: '0 7 * * 0'     # Dimanche 9h00 — signaux
    - cron: '35 15 * * 1-4' # Lun-Jeu 17h35 — prix silencieux
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests python-docx pandas numpy -q

      - name: Determine day
        id: day
        run: |
          DAY=$(date +%u)
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "Day = $DAY (1=lun 2=mar 3=mer 4=jeu 5=ven 6=sam 7=dim)"

      - name: Update prices
        if: steps.day.outputs.day != '6'
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
        run: python update_prices_v2.py

      - name: Update fundamentals
        if: steps.day.outputs.day == '6'
        run: python update_fundamentals.py

      - name: Generate revue vendredi
        if: steps.day.outputs.day == '5'
        run: python generate_reports.py vendredi

      - name: Generate signaux dimanche
        if: steps.day.outputs.day == '7'
        run: python generate_reports.py dimanche

      - name: Send Friday email
        if: steps.day.outputs.day == '5'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python send_alerts_v2.py

      - name: Commit and push
        run: |
          git config user.name "VAL.PEA Bot"
          git config user.email "bot@val.pea"
          git add index.html prices_memory.json VAL_PEA_*.docx 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M') [skip ci]"
          git push
