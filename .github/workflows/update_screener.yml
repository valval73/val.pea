name: Update PEA Screener

on:
  schedule:
    - cron: '35 15 * * 1-5'   # Lun-Ven 17h35 Paris — MAJ prix uniquement
    - cron: '0 6 * * 6'        # Samedi 8h Paris — MAIL hebdo
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dependances
        run: pip install yfinance requests

      - name: MAJ prix (tous les jours)
        run: python fetch_prices.py

      - name: MAJ fundamentals (tous les jours)
        run: python fetch_fundamentals.py || true

      - name: Mail hebdo BAM (samedi uniquement)
        if: github.event.schedule == '0 6 * * 6' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          MAIL_USER: ${{ secrets.GMAIL_USER }}
          MAIL_PASS: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          MAIL_TO: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weekly_digest.py

      - name: Supprimer fichiers temporaires
        run: |
          git rm --ignore-unmatch "*.docx" 2>/dev/null || true
          rm -f *.docx alert_preview.html mail_preview.html weekly_preview.html 2>/dev/null || true

      - name: Commit et push
        run: |
          git config user.name "PEA Bot"
          git config user.email "bot@pea.fr"
          git add index.html prices.json prices_memory.json data.js fundamentals_log.json 2>/dev/null || true
          git add .gitignore 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update $(date '+%d/%m %H:%M') [skip ci]"
          git push
