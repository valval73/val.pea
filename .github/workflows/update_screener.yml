name: Update PEA Screener

on:
  schedule:
    # Lun-Jeu 17h35 (prix + mail alertes)
    - cron: '35 15 * * 1-4'
    # Vendredi 18h00 (prix + recalibration + revue portefeuille + mail)
    - cron: '0 16 * * 5'
    # Samedi 8h00 (fondamentaux)
    - cron: '0 6 * * 6'
    # Dimanche 9h00 (mail signaux + doc signaux)
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (prices/fundamentals/alerts/reports/all)'
        required: false
        default: 'all'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-docx yfinance

      - name: Determine day
        id: day
        run: |
          DAY=$(date +%u)  # 1=lundi ... 7=dimanche
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "Today is day $DAY"

      # ── PRIX (tous les jours en semaine) ───────────────────────
      - name: Update prices
        if: steps.day.outputs.day != '6'
        run: |
          python update_prices_v2.py
          echo "Prices updated"

      # ── FONDAMENTAUX (samedi seulement) ────────────────────────
      - name: Update fundamentals
        if: steps.day.outputs.day == '6'
        run: |
          python update_fundamentals.py
          echo "Fundamentals updated"

      # ── REVUE PORTEFEUILLE (vendredi seulement) ─────────────────
      - name: Generate revue vendredi
        if: steps.day.outputs.day == '5'
        env:
          PYTHONPATH: .
        run: |
          python generate_reports.py vendredi
          echo "Revue vendredi generated"

      # ── SIGNAUX DIMANCHE ────────────────────────────────────────
      - name: Generate signaux dimanche
        if: steps.day.outputs.day == '0' || steps.day.outputs.day == '7'
        env:
          PYTHONPATH: .
        run: |
          python generate_reports.py dimanche
          echo "Signaux dimanche generated"

      # ── MAIL ALERTES (lun-ven) ──────────────────────────────────
      - name: Send alerts email
        if: steps.day.outputs.day != '6'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python send_alerts_v2.py

      # ── COMMIT tout ─────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "VAL.PEA Bot"
          git config user.email "bot@val.pea"
          git add index.html VAL_PEA_*.docx 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M') [skip ci]"
          git push
